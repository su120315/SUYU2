<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            line-height: 1.6;
            color: #333;
            background: #fff;
            background-image: url('浅灰白渐变.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 24px;
            background-image: url('photo-1772383776689.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        h1 {
            font-size: 2.2em;
            font-weight: 600;
            margin-bottom: 12px;
            color: #1a1a1a;
        }

        .tagline {
            font-size: 1.1em;
            color: #666;
            margin-bottom: 32px;
        }

        section {
            margin-bottom: 48px;
        }

        h2 {
            font-size: 1.4em;
            font-weight: 600;
            margin-bottom: 20px;
            color: #1a1a1a;
            border-bottom: 2px solid #f5f5f5;
            padding-bottom: 8px;
        }

        .bio {
            color: #555;
            line-height: 1.8;
        }

        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .skill-tag {
            background: #f5f5f5;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            color: #555;
        }

        .project-item {
            margin-bottom: 24px;
        }

        .project-title {
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 6px;
        }

        .project-desc {
            color: #666;
            font-size: 0.95em;
        }

        .project-link {
            color: #007aff;
            text-decoration: none;
            font-size: 0.9em;
        }

        .project-link:hover {
            text-decoration: underline;
        }

        .contact-links {
            display: flex;
            gap: 24px;
        }

        .contact-link {
            color: #007aff;
            text-decoration: none;
            font-size: 1em;
        }

        .contact-link:hover {
            text-decoration: underline;
        }

        footer {
            text-align: center;
            padding-top: 40px;
            color: #999;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            body {
                padding: 30px 16px;
            }

            h1 {
                font-size: 1.8em;
            }

            .contact-links {
                flex-direction: column;
                gap: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="avatar"></div>
    <h1>蘇魚</h1>
    <p class="tagline">手握日月摘星辰，世间无我这般人</p>

    <section>
        <h2>关于我</h2>
        <p class="bio">
            男，14岁。
        </p>
    </section>

    <section>
        <h2>技能</h2>
        <div class="skills">
            <span class="skill-tag">技能 1</span>
            <span class="skill-tag">技能 2</span>
            <span class="skill-tag">技能 3</span>
            <span class="skill-tag">技能 4</span>
        </div>
    </section>

    <section>
        <h2>推荐工具</h2>
        <div class="project-item">
            <div class="project-title">Steam</div>
            <div class="project-desc">全球最大的数字游戏发行平台，数万款游戏等你探索</div>
            <a href="https://store.steampowered.com/" class="project-link" target="_blank">官网下载 →</a>
        </div>
        <div class="project-item">
            <div class="project-title">图吧工具箱</div>
            <div class="project-desc">专业硬件检测工具合集，CPU、显卡、内存、硬盘全面检测</div>
            <a href="https://www.tbtool.cn/" class="project-link" target="_blank">官网下载 →</a>
        </div>
    </section>

    <section>
        <h2>联系</h2>
        <div class="contact-links">
            <a href="tel:1995455767" class="contact-link">电话: 1995455767</a>
            <a href="#" class="contact-link">GitHub</a>
            <a href="#" class="contact-link">微信</a>
            <a href="#" class="contact-link">LinkedIn</a>
        </div>
    </section>

    <footer>
        <p>© 2026 蘇魚. All rights reserved.</p>
    </footer>
</body>
</html>
